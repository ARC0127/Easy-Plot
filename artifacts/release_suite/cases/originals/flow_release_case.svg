<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560">
  <rect x="0" y="0" width="960" height="560" fill="#f8fafc" />
  <g id="flow_panel" data-fe-object-id="flow_panel">
    <rect x="36" y="36" width="888" height="488" rx="22" fill="#ffffff" stroke="#d6deea" stroke-width="2" />
    <text x="72" y="86" font-size="34" font-weight="700" font-family="Cascadia Mono, Consolas, SFMono-Regular, Liberation Mono, DejaVu Sans Mono, monospace" fill="#0f172a" data-fe-object-id="flow_title">Flow Release Validation</text>
    <text x="72" y="118" font-size="16" font-family="Cascadia Mono, Consolas, SFMono-Regular, Liberation Mono, DejaVu Sans Mono, monospace" fill="#64748b">Group move, label edit, add note, delete note, export bundle</text>

    <g id="flow_ingest_group" data-fe-object-id="flow_ingest_group">
      <rect x="92" y="214" width="194" height="112" rx="20" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="3" />
      <text x="140" y="278" font-size="28" font-weight="700" font-family="Cascadia Mono, Consolas, SFMono-Regular, Liberation Mono, DejaVu Sans Mono, monospace" fill="#0f172a">Ingest</text>
    </g>

    <g id="flow_verify_group" data-fe-object-id="flow_verify_group">
      <rect x="384" y="214" width="204" height="112" rx="20" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3" />
      <text x="426" y="278" font-size="28" font-weight="700" font-family="Cascadia Mono, Consolas, SFMono-Regular, Liberation Mono, DejaVu Sans Mono, monospace" fill="#0f172a" data-fe-object-id="flow_verify_label">Verify</text>
    </g>

    <g id="flow_publish_group" data-fe-object-id="flow_publish_group">
      <rect x="686" y="214" width="184" height="112" rx="20" fill="#ecfccb" stroke="#84cc16" stroke-width="3" />
      <text x="722" y="278" font-size="28" font-weight="700" font-family="Cascadia Mono, Consolas, SFMono-Regular, Liberation Mono, DejaVu Sans Mono, monospace" fill="#0f172a">Publish</text>
    </g>

    <line x1="286" y1="270" x2="384" y2="270" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" />
    <polygon points="372,258 392,270 372,282" fill="#94a3b8" />
    <line x1="588" y1="270" x2="686" y2="270" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" />
    <polygon points="674,258 694,270 674,282" fill="#94a3b8" />

    <g id="flow_review_lane" data-fe-object-id="flow_review_lane">
      <rect x="154" y="382" width="622" height="58" rx="16" fill="#f8fafc" stroke="#d6deea" stroke-width="2" />
      <text x="188" y="418" font-size="22" font-family="Cascadia Mono, Consolas, SFMono-Regular, Liberation Mono, DejaVu Sans Mono, monospace" fill="#334155">Review lane: operator checks delta and approves export</text>
    </g>

    <text x="612" y="490" font-size="18" font-family="Cascadia Mono, Consolas, SFMono-Regular, Liberation Mono, DejaVu Sans Mono, monospace" fill="#64748b" data-fe-object-id="flow_note_delete">Obsolete note: remove this before publish</text>
  </g>
